name: iOS Build & IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      XCODE_PROJECT: VFS_Liveness_Demo.xcodeproj
      XCODE_SCHEME: VFS_Liveness_Demo
      XCODE_BUILD_DIR: build
      # قم بتعيين القيم الافتراضية أو املأها من secrets
      DEVELOPER_DIR: /Applications/Xcode_15.3.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            pods-

      - name: Install dependencies
        run: |
          if [ -f Package.swift ]; then
            swift package resolve
          fi
          if [ -f Podfile ]; then
            pod install --repo-update
          fi

      - name: List Project Files
        run: |
          echo "=== Project Structure ==="
          find . -maxdepth 3 -name "*.swift" -o -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "Info.plist"
          ls -la "$XCODE_PROJECT" || echo "Project file not found"

      - name: Build .app
        run: |
          echo "Building app..."
          mkdir -p "build/app_output"
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$PWD/build/app_output" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build | xcpretty --color
          
          echo "=== Build output ==="
          ls -la build/app_output/

      - name: Create unsigned IPA
        run: |
          set -euo pipefail
          echo "Creating unsigned IPA..."
          
          APP_PATH="$(find "build/app_output" -type d -name "*.app" | head -n 1)"
          echo "Found app: ${APP_PATH}"
          
          if [ -z "${APP_PATH}" ] || [ ! -d "${APP_PATH}" ]; then
            echo "Error: .app not found in build/app_output"
            find "build" -type d -name "*.app" -maxdepth 6
            exit 1
          fi
          
          mkdir -p "build/exports/Payload"
          cp -R "${APP_PATH}" "build/exports/Payload/"
          
          cd "build/exports"
          zip -r "${XCODE_SCHEME}.ipa" Payload/
          ls -lh "${XCODE_SCHEME}.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VFS_Liveness_Demo_${{ github.sha }}
          path: build/exports/*.ipa
          retention-days: 14

      - name: Upload dSYMs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dSYMs_${{ github.sha }}
          path: ${{ env.XCODE_BUILD_DIR }}/**/*.dSYM
          retention-days: 7

      - name: Show Build Output
        if: always()
        run: |
          echo "=== Build Directory ==="
          find "$XCODE_BUILD_DIR" -type f -name "*.ipa" -o -name "*.xcarchive" -o -name "*.app"
          ls -lh "$XCODE_BUILD_DIR/exports/" || true

      - name: Build Summary
        if: success()
        run: |
          echo "## Build Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### IPA Files" >> $GITHUB_STEP_SUMMARY
          echo "- **IPA:** VFS_Liveness_Demo_${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "Go to **Actions** → select latest run → **Artifacts** section" >> $GITHUB_STEP_SUMMARY

      - name: Build Failed Notification
        if: failure()
        run: |
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs for details" >> $GITHUB_STEP_SUMMARY
