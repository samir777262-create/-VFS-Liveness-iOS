name: iOS Build & IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      XCODE_PROJECT: VFS_Liveness_Demo.xcodeproj
      XCODE_SCHEME: VFS_Liveness_Demo

    steps:
      - uses: actions/checkout@v4

      - run: sudo xcode-select -s /Applications/Xcode_15.3.app

      - name: Build .app for device
        run: |
          set -e
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build/dd" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create unsigned IPA
        run: |
          set -e
          APP_PATH=$(find "build/dd" -type d -name "*.app" -maxdepth 10 | head -1)
          echo "App found at: $APP_PATH"
          mkdir -p "build/exports/Payload"
          cp -R "$APP_PATH" "build/exports/Payload/"
          cd "build/exports"
          zip -r "${XCODE_SCHEME}.ipa" Payload/
          ls -lh "${XCODE_SCHEME}.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VFS_Liveness_Demo_${{ github.sha }}
          path: build/exports/*.ipa
          retention-days: 14
