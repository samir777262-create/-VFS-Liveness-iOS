name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  XCODE_PROJECT: VFS_Liveness_Demo.xcodeproj
  XCODE_SCHEME: VFS_Liveness_Demo
  XCODE_BUILD_DIR: build

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.3.app

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: pods-

      - name: Install dependencies
        run: |
          if [ -f Package.swift ]; then
            swift package resolve
          fi
          if [ -f Podfile ]; then
            pod install --repo-update
          fi

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$XCODE_BUILD_DIR/$XCODE_SCHEME.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive | xcpretty

      - name: Create unsigned IPA
        run: |
          ARCHIVE_PATH="$XCODE_BUILD_DIR/$XCODE_SCHEME.xcarchive"
          mkdir -p "$XCODE_BUILD_DIR/exports/Payload"
          
          APP_BUNDLE=$(find "$ARCHIVE_PATH" -name "*.app" -type d -maxdepth 4 | head -1)
          echo "Found app bundle: $APP_BUNDLE"
          
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app found in archive!"
            find "$ARCHIVE_PATH" -type d -maxdepth 4
            exit 1
          fi
          
          cp -R "$APP_BUNDLE" "$XCODE_BUILD_DIR/exports/Payload/"
          cd "$XCODE_BUILD_DIR/exports"
          zip -r "$XCODE_SCHEME.ipa" Payload/
          ls -lh "$XCODE_SCHEME.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VFS_Liveness_Demo_${{ github.sha }}
          path: ${{ env.XCODE_BUILD_DIR }}/exports/*.ipa
          retention-days: 14

      - name: Upload dSYMs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dSYMs_${{ github.sha }}
          path: ${{ env.XCODE_BUILD_DIR }}/**/*.dSYM
          retention-days: 7

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Build Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IPA:** VFS_Liveness_Demo_${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
